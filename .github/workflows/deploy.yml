# Deploy Multi-Model LLM Router to AWS

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        type: choice
        options: [dev, staging, prod]
        default: dev
      geography:
        description: "AWS geography for cross-region inference"
        type: choice
        options: [us, eu, ap]
        default: us

env:
  AWS_REGION: us-east-1
  ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
  AWS_GEOGRAPHY: ${{ github.event.inputs.geography || 'us' }}

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: CDK Deploy
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: MultiModelRouterDeploy

      - name: Bootstrap CDK (if needed)
        run: npx cdk bootstrap aws://${{ secrets.AWS_ACCOUNT_ID }}/${{ env.AWS_REGION }}

      - name: Synth
        run: npx cdk synth --context geography=${{ env.AWS_GEOGRAPHY }}

      - name: Deploy
        run: >-
          npx cdk deploy --require-approval never
          --context geography=${{ env.AWS_GEOGRAPHY }}
          --tags Environment=${{ env.ENVIRONMENT }}
          --tags Geography=${{ env.AWS_GEOGRAPHY }}
